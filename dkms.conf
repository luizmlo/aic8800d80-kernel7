PACKAGE_NAME="aic8800d80"
PACKAGE_VERSION="6.4.3.0"
AUTOINSTALL="yes"

# The driver's Makefile defaults KVER/KDIR to the running kernel via
# `uname -r`; override them so DKMS can build for any target kernel.
MAKE[0]="make -C drivers/aic8800 KVER=${kernelver} KDIR=/lib/modules/${kernelver}/build modules"
CLEAN="make -C drivers/aic8800 KVER=${kernelver} KDIR=/lib/modules/${kernelver}/build clean"

# Firmware loader (built first; aic8800_fdrv depends on it)
BUILT_MODULE_NAME[0]="aic_load_fw"
BUILT_MODULE_LOCATION[0]="drivers/aic8800/aic_load_fw"
DEST_MODULE_LOCATION[0]="/kernel/drivers/net/wireless/aic8800"

# Main WiFi driver
BUILT_MODULE_NAME[1]="aic8800_fdrv"
BUILT_MODULE_LOCATION[1]="drivers/aic8800/aic8800_fdrv"
DEST_MODULE_LOCATION[1]="/kernel/drivers/net/wireless/aic8800"
